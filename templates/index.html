<!DOCTYPE html>
<html>

<head>

    <title>Invoice Analyzer</title>

    <meta charset="utf-8">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">
        Invoice Analyzer
    </h1>

    <div class="card p-4">

        <h5>Select Folder</h5>

        <input
            type="file"
            id="folder"
            webkitdirectory
            multiple
            class="form-control"
        >

        <br>

        <button
            class="btn btn-primary"
            onclick="uploadFolder()"
        >
            Upload Folder
        </button>

        <button
            class="btn btn-success ms-2"
            onclick="processInvoices()"
        >
            Process Invoices
        </button>

        <br><br>

        <div
            id="status"
            class="alert alert-info"
        >
            Ready
        </div>

        <a
            id="downloadBtn"
            href="/download-excel"
            class="btn btn-warning"
            style="display:none"
        >
            Download Excel
        </a>

    </div>

</div>

<script>

async function uploadFolder() {

    let files =
        document.getElementById(
            "folder"
        ).files;

    if(files.length === 0)
    {
        alert("Please select a folder");
        return;
    }

    let formData =
        new FormData();

    for(let file of files)
    {
        formData.append(
            "files",
            file
        );
    }

    document.getElementById(
        "status"
    ).innerHTML =
        "Uploading...";

    let response =
        await fetch(
            "/upload-folder",
            {
                method: "POST",
                body: formData
            }
        );

    let result =
        await response.json();

    document.getElementById(
        "status"
    ).innerHTML =
        "Uploaded " +
        result.uploaded +
        " PDF files";
}

async function processInvoices() {

    document.getElementById(
        "status"
    ).innerHTML =
        "Processing invoices...";

    let response =
        await fetch(
            "/process-folder",
            {
                method: "POST"
            }
        );

    let result =
        await response.json();

    if(result.success)
    {
        document.getElementById(
            "status"
        ).innerHTML =
            "Processed " +
            result.processed +
            " invoices";

        document.getElementById(
            "downloadBtn"
        ).style.display =
            "inline-block";
    }
    else
    {
        document.getElementById(
            "status"
        ).innerHTML =
            "Processing failed";
    }
}

</script>

</body>
</html>
